name: Packaging App
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
        #   - windows-latest
        #   - macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with: 
          python-version: "3.12.3"

      - name: Install Python Dependencies
        run: |
           python -m pip install --upgrade pip
           pip install -r src/requirements.txt
           pip install pyinstaller

      - name: Python Build
        run: |
          pyinstaller src/PDXEdit.spec

      - name: Build DMG
        if: matrix.os == 'macos-latest'
        run: |
          hdiutil create PDXEdit.dmg -srcfolder dist/PDXEdit.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDXEdit-${{ matrix.os }}
          path: dist/

  create_release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Get Release SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        id: release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.vars.outputs.sha_short }}
          release_name: Release ${{ steps.vars.outputs.sha_short }}
          draft: false
          prerelease: false

    #   - name: Download Windows exe
    #     uses: actions/download-artifact@v4
    #     with:
    #       name: PDXEdit-ubuntu-latest
    #       path: release/

    #   - name: Attach Windows exe to release
    #     uses: actions/upload-release-asset@v1
    #     env:
    #       GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    #     with:
    #       upload_url: ${{ steps.release.outputs.upload_url }}
    #       asset_path: release/PDXEdit-windows-latest/PDXEdit.exe
    #       asset_name: PDXEdit.exe
    #       asset_content_type: application/vnd.microsoft.portable-executable

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: PDXEdit-ubuntu-latest
          path: release/

      - name: Attach Linux binary to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: release/PDXEdit
          asset_name: PDXEdit
          asset_content_type: application/octet-stream

    #   - name: Download MacOSX app
    #     uses: actions/download-artifact@v4
    #     with:
    #       name: PDXEdit-ubuntu-latest
    #       path: release/

    #   - name: Attach MacOSX app to release
    #     uses: actions/upload-release-asset@v1
    #     env:
    #       GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    #     with:
    #       upload_url: ${{ steps.release.outputs.upload_url }}
    #       asset_path: release/PDXEdit-macos-latest/PDXEdit.dmg
    #       asset_name: PDXEdit.dmg
